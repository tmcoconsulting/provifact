site_name: EvidenceOps
site_description: Continuous audit evidence for regulated endpoint-management teams
site_url: https://evidenceops.tmcoconsulting.com/
repo_url: https://github.com/tmcoconsulting/evidenceops
repo_name: tmcoconsulting/evidenceops
edit_uri: edit/main/docs/
copyright: Copyright &copy; 2026 TMCO Consulting, LLC

theme:
  name: material
  language: en
  font: false
  logo: assets/images/tmco-favicon.svg
  favicon: assets/images/tmco-favicon.svg
  features:
    - navigation.footer
    - navigation.indexes
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

nav:
  - Start Here: index.md
  - Product:
      - Mission Control: evidence-dashboard.md
      - Settings & Baselines: settings-matrix.md
      - Runtime Demo: live-demo.md
  - How It Works:
      - Architecture: architecture.md
      - Audit Methodology: audit-methodology.md
      - Security Model: security-model.md
      - Data Handling: data-handling.md
      - Threat Model: threat-model.md
  - Operate:
      - Getting Started: getting-started.md
      - Local Demo: operations/demo-mode.md
      - Live Read-Only Collection: operations/live-collection.md
      - Cloudflare Worker: operations/cloudflare-worker.md
      - Deployment Models: operations/deployment-models.md
      - Incident Response: operations/incident-response.md
  - Project:
      - Roadmap: roadmap.md
      - Videos: videos.md
      - Build Week:
          - Codex Collaboration: build-week/codex-collaboration.md
          - Decision Log: build-week/decision-log.md
          - Contribution Log: build-week/contribution-log.md
          - Phase 1 Validation: build-week/phase-1-validation.md
          - Worker Validation: build-week/cloudflare-worker-validation.md
          - Build Week Slice Validation: build-week/build-week-slice-validation.md
          - Final Live MVP Validation: build-week/final-live-mvp-validation.md
          - FileVault & NOC Validation: build-week/filevault-noc-validation.md
          - Final Implementation Report: build-week/final-implementation-report.md
          - Demo Package: build-week/demo-package.md
          - Final Video Runbook: build-week/video-runbook.md
          - Submission Checklist: build-week/submission-checklist.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - assets/stylesheets/extra.css?v=20260720-noc1
  - assets/stylesheets/settings-matrix.css?v=20260720-final
  - assets/stylesheets/assistant-evidence-context.css?v=20260720-final

extra_javascript:
  - assets/javascripts/mission-control.js?v=20260720-noc1
  - assets/javascripts/evidenceops-api.js?v=20260720-final
  - assets/javascripts/settings-matrix.js?v=20260720-final
  - assets/javascripts/assistant-evidence-context.js?v=20260720-noc1

plugins:
  - search

strict: true
exclude_docs: |
  private/**
