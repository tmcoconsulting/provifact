site_name: Provifact™ by TMCO Consulting
site_description: From approved change to audit-ready proof.
site_url: https://evidenceops.tmcoconsulting.com/
repo_url: https://github.com/tmcoconsulting/evidenceops
repo_name: Provifact source
edit_uri: edit/main/docs/
copyright: Copyright &copy; 2026 TMCO Consulting, LLC · Provifact™

theme:
  name: material
  language: en
  font: false
  logo: assets/images/provifact-mark.svg
  favicon: assets/images/provifact-mark.svg
  features:
    - navigation.footer
    - navigation.indexes
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
  palette:
    scheme: slate
    primary: indigo
    accent: cyan

nav:
  - Start Here: index.md
  - Mission Control: evidence-dashboard.md
  - Baseline Plan: settings-matrix.md
  - Judge Guide: judge-guide.md
  - Trust & Design:
      - Architecture: architecture.md
      - Audit Methodology: audit-methodology.md
      - Security Model: security-model.md
      - Data Handling: data-handling.md
      - Threat Model: threat-model.md
  - Operate:
      - Getting Started: getting-started.md
      - Runtime Status: live-demo.md
      - Local Demo: operations/demo-mode.md
      - Live Read-Only Collection: operations/live-collection.md
      - Cloudflare Worker: operations/cloudflare-worker.md
      - Deployment Models: operations/deployment-models.md
      - Incident Response: operations/incident-response.md
  - Project Evidence:
      - Roadmap: roadmap.md
      - Videos: videos.md
      - Build Week:
          - Demo Package: build-week/demo-package.md
          - Current Judge-Readiness Validation: build-week/judge-readiness-validation.md
          - FileVault & NOC Validation: build-week/filevault-noc-validation.md
          - Decision Log: build-week/decision-log.md
          - Contribution Log: build-week/contribution-log.md
          - Codex Collaboration: build-week/codex-collaboration.md
          - Final Video Runbook: build-week/video-runbook.md
          - Submission Checklist: build-week/submission-checklist.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - assets/stylesheets/extra.css?v=20260720-judge2
  - assets/stylesheets/settings-matrix.css?v=20260720-judge2
  - assets/stylesheets/assistant-evidence-context.css?v=20260720-judge2

extra_javascript:
  - assets/javascripts/mission-control.js?v=20260720-judge2
  - assets/javascripts/provifact-api.js?v=20260720-judge2
  - assets/javascripts/settings-matrix.js?v=20260720-judge2
  - assets/javascripts/assistant-evidence-context.js?v=20260720-judge2

plugins:
  - search

strict: true
exclude_docs: |
  private/**
