minimum_pre_commit_version: "4.6.0"
repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: Ruff lint
        entry: python -m ruff check
        language: system
        types: [python]
      - id: ruff-format
        name: Ruff format
        entry: python -m ruff format --check
        language: system
        types: [python]
      - id: secret-scan
        name: Provifact secret scan
        entry: python scripts/check_secrets.py
        language: system
        pass_filenames: false
