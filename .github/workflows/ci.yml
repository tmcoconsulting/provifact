name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Phase 1 and Worker public validation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONDONTWRITEBYTECODE: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      CLOUDFLARE_LOAD_DEV_VARS_FROM_DOT_ENV: "false"
    steps:
      - name: Check out the validated revision
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: npm

      - name: Install locked dependencies
        run: |
          python -m pip install -r requirements-dev.txt
          python -m pip install --no-build-isolation --no-deps .

      - name: Install locked Worker dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Check formatting
        run: python -m ruff format --check .

      - name: Lint
        run: python -m ruff check .

      - name: Type check
        run: python -m mypy

      - name: Unit tests
        run: python -m pytest

      - name: Rebuild and verify synthetic static-demo data
        run: |
          python -m evidenceops rebuild-static-demo
          git diff --exit-code -- docs/assets/data

      - name: Static security checks
        run: |
          python -m bandit -r evidenceops scripts -c pyproject.toml
          python scripts/check_company_name.py

      - name: Secret scan
        run: python scripts/check_secrets.py

      - name: Dependency vulnerability audit
        run: |
          python -m pip_audit -r requirements-dev.txt
          npm audit --audit-level=moderate

      - name: Build documentation
        run: mkdocs build --strict

      - name: Scan generated public site
        run: python scripts/check_public_artifacts.py site

      - name: Validate Worker formatting and types
        run: |
          npm run format:check
          npm run lint:worker
          npm run typecheck:worker

      - name: Run Worker contract tests
        run: npm run test:worker

      - name: Validate generated Worker bindings
        run: npm run worker:types:check

      - name: Build Worker bundle without deploying
        run: |
          npm run worker:dry-run
          npm run worker:dry-run:preview
          npm run worker:dry-run:production
