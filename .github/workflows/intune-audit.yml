name: Read-only Intune audit

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: intune-audit-production
  cancel-in-progress: false

jobs:
  collect:
    name: Federated read-only collection
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    env:
      AZURE_CORE_OUTPUT: none
      PYTHONDONTWRITEBYTECODE: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
    steps:
      - name: Check out trusted main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: main

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install locked dependencies
        run: |
          python -m pip install -r requirements-dev.txt
          python -m pip install --no-build-isolation --no-deps .

      - name: Validate collection and publication contracts
        run: |
          python -m pytest -o addopts='' tests/test_permissions_manifest.py tests/test_intune_provider.py tests/test_publication.py tests/test_sanitization.py
          python scripts/check_secrets.py

      - name: Authenticate to Microsoft Entra through GitHub OIDC
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ vars.INTUNE_CLIENT_ID }}
          tenant-id: ${{ vars.INTUNE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Collect, sanitize, and verify without retaining private evidence
        env:
          AZURE_CLIENT_ID: ${{ vars.INTUNE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.INTUNE_TENANT_ID }}
        run: |
          set -euo pipefail
          token="$(az account get-access-token --resource-type ms-graph --query accessToken --output tsv)"
          echo "::add-mask::$token"
          export EVIDENCEOPS_GRAPH_ACCESS_TOKEN="$token"
          python -m evidenceops live-collect --auth environment-token --private-dir artifacts/private --retention-days 1
          private_package="$(find artifacts/private -maxdepth 1 -type f -name 'private-evidence-*.json' -print -quit)"
          test -n "$private_package"
          export EVIDENCEOPS_PSEUDONYM_KEY="$(openssl rand -hex 32)"
          python -m evidenceops publish "$private_package" --output build/live-public/evidence.json
          unset EVIDENCEOPS_PSEUDONYM_KEY EVIDENCEOPS_GRAPH_ACCESS_TOKEN token
          python scripts/check_public_artifacts.py build/live-public
          python scripts/report_public_counts.py build/live-public/evidence.json >> "$GITHUB_STEP_SUMMARY"

      - name: Remove ephemeral live evidence
        if: always()
        run: |
          find artifacts/private -type f -delete 2>/dev/null || true
          find build/live-public -type f -delete 2>/dev/null || true
