name: Read-only Intune audit

on:
  workflow_dispatch:
    inputs:
      prepare_publication:
        description: Upload the scanned public Mission package for a separate reviewed deployment
        required: true
        type: boolean
        default: false
      prior_sanitized_audit_run_id:
        description: Optional prior successful live audit run for current-versus-prior comparison
        required: false
        type: string

permissions:
  contents: read
  actions: read
  id-token: write

concurrency:
  group: intune-audit-production
  cancel-in-progress: false

jobs:
  collect:
    name: Federated read-only collection
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    env:
      AZURE_CORE_OUTPUT: none
      PYTHONDONTWRITEBYTECODE: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PRIOR_SANITIZED_AUDIT_RUN_ID: ${{ inputs.prior_sanitized_audit_run_id }}
    steps:
      - name: Check out trusted main
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
          ref: ${{ github.sha }}

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install locked dependencies
        run: |
          python -m pip install -r requirements-dev.txt
          python -m pip install --no-build-isolation --no-deps .

      - name: Validate collection and publication contracts
        run: |
          python -m pytest -o addopts='' tests/test_permissions_manifest.py tests/test_intune_provider.py tests/test_apple_provider.py tests/test_mission.py tests/test_publication.py tests/test_sanitization.py
          python scripts/check_secrets.py

      - name: Validate prior live publication selector
        if: inputs.prior_sanitized_audit_run_id != ''
        run: |
          if [[ ! "$PRIOR_SANITIZED_AUDIT_RUN_ID" =~ ^[0-9]{1,20}$ ]]; then
            echo "invalid prior sanitized audit run selector" >&2
            exit 2
          fi

      - name: Verify prior audit run provenance
        if: inputs.prior_sanitized_audit_run_id != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "/repos/$GITHUB_REPOSITORY/actions/runs/$PRIOR_SANITIZED_AUDIT_RUN_ID" \
            > "$RUNNER_TEMP/evidenceops-prior-audit-run.json"
          jq -e '
            .name == "Read-only Intune audit" and
            .path == ".github/workflows/intune-audit.yml" and
            .event == "workflow_dispatch" and
            .head_branch == "main" and
            .status == "completed" and
            .conclusion == "success"
          ' "$RUNNER_TEMP/evidenceops-prior-audit-run.json" > /dev/null || {
            echo "prior artifact is not from a successful trusted-main Intune audit" >&2
            exit 2
          }

      - name: Download prior sanitized Mission package
        if: inputs.prior_sanitized_audit_run_id != ''
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: evidenceops-sanitized-mission-${{ inputs.prior_sanitized_audit_run_id }}
          path: build/previous-public
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.prior_sanitized_audit_run_id }}

      - name: Revalidate prior live Mission package
        if: inputs.prior_sanitized_audit_run_id != ''
        run: |
          test "$(find build/previous-public -mindepth 1 -print | wc -l | tr -d ' ')" = "1"
          python scripts/check_public_artifacts.py build/previous-public
          python scripts/promote_live_mission.py \
            build/previous-public/mission-control.json \
            --destination "$RUNNER_TEMP/evidenceops-previous-public.json"
          echo "PREVIOUS_PUBLIC_PATH=$RUNNER_TEMP/evidenceops-previous-public.json" >> "$GITHUB_ENV"

      - name: Authenticate to Microsoft Entra through GitHub OIDC
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ vars.INTUNE_CLIENT_ID }}
          tenant-id: ${{ vars.INTUNE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Collect, sanitize, and verify without retaining private evidence
        env:
          AZURE_CLIENT_ID: ${{ vars.INTUNE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.INTUNE_TENANT_ID }}
        run: |
          set -euo pipefail
          token="$(az account get-access-token --resource-type ms-graph --query accessToken --output tsv)"
          echo "::add-mask::$token"
          export EVIDENCEOPS_GRAPH_ACCESS_TOKEN="$token"
          python -m evidenceops live-collect-apple --auth environment-token --private-dir artifacts/private --retention-days 1
          private_package="$(find artifacts/private -maxdepth 1 -type f -name 'private-apple-*.json' -print -quit)"
          test -n "$private_package"
          export EVIDENCEOPS_PSEUDONYM_KEY="$(openssl rand -hex 32)"
          publication_args=(
            publish-mission
            "$private_package"
            --output build/live-public/mission-control.json
          )
          if [ -n "${PREVIOUS_PUBLIC_PATH:-}" ]; then
            publication_args+=(--previous-public "$PREVIOUS_PUBLIC_PATH")
          fi
          python -m evidenceops "${publication_args[@]}"
          unset EVIDENCEOPS_PSEUDONYM_KEY EVIDENCEOPS_GRAPH_ACCESS_TOKEN token
          python scripts/check_public_artifacts.py build/live-public
          python scripts/report_public_counts.py build/live-public/mission-control.json >> "$GITHUB_STEP_SUMMARY"

      - name: Upload scanned public Mission package for review
        if: inputs.prepare_publication
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: evidenceops-sanitized-mission-${{ github.run_id }}
          path: build/live-public/mission-control.json
          if-no-files-found: error
          retention-days: 1
          compression-level: 0
          overwrite: false
          include-hidden-files: false

      - name: Remove ephemeral live evidence
        if: always()
        run: |
          find artifacts/private -type f -delete 2>/dev/null || true
          find build/live-public -type f -delete 2>/dev/null || true
          find build/previous-public -type f -delete 2>/dev/null || true
          find "$RUNNER_TEMP" -maxdepth 1 -type f -name 'evidenceops-previous-public.json' -delete 2>/dev/null || true
