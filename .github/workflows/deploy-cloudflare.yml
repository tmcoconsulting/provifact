name: Deploy Cloudflare production

on:
  workflow_dispatch:
    inputs:
      confirm_production_deploy:
        description: Confirm this reviewed main-branch production deployment
        required: true
        type: boolean
        default: false
      sanitized_audit_run_id:
        description: Successful reviewed Intune audit run containing the live public Mission
        required: true
        type: string
      expected_source_snapshot_id:
        description: Exact reviewed Mission snapshot ID from that sanitized audit artifact
        required: true
        type: string

permissions:
  contents: read
  actions: read

concurrency:
  group: cloudflare-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Validate and deploy reviewed production
    if: >-
      github.ref == 'refs/heads/main' &&
      github.event_name == 'workflow_dispatch' &&
      inputs.confirm_production_deploy
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: production
    env:
      PYTHONDONTWRITEBYTECODE: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      CLOUDFLARE_LOAD_DEV_VARS_FROM_DOT_ENV: "false"
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_DEPLOY_ENABLED: ${{ vars.CLOUDFLARE_DEPLOY_ENABLED }}
      SANITIZED_AUDIT_RUN_ID: ${{ inputs.sanitized_audit_run_id }}
      EXPECTED_SOURCE_SNAPSHOT_ID: ${{ inputs.expected_source_snapshot_id }}
    steps:
      - name: Require reviewed deployment window
        run: |
          if [ "$CLOUDFLARE_DEPLOY_ENABLED" != "true" ]; then
            echo "production deployment window is disabled" >&2
            exit 2
          fi
          if [[ ! "$SANITIZED_AUDIT_RUN_ID" =~ ^[0-9]{1,20}$ ]]; then
            echo "invalid sanitized audit run selector" >&2
            exit 2
          fi
          if [[ ! "$EXPECTED_SOURCE_SNAPSHOT_ID" =~ ^mission-[0-9a-f]{24}$ ]]; then
            echo "invalid expected Mission snapshot ID" >&2
            exit 2
          fi

      - name: Check out trusted main
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
          ref: ${{ github.sha }}

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: npm

      - name: Install locked dependencies
        run: |
          python -m pip install -r requirements-dev.txt
          python -m pip install --no-build-isolation --no-deps .
          npm ci --ignore-scripts --no-audit --no-fund

      - name: Run complete public validation
        run: |
          python -m ruff format --check .
          python -m ruff check .
          python -m mypy
          python -m pytest
          python -m bandit -r evidenceops scripts -c pyproject.toml
          python scripts/check_company_name.py
          python scripts/check_secrets.py
          python -m pip_audit -r requirements-dev.txt
          npm audit --audit-level=moderate

      - name: Verify reviewed audit run provenance
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "/repos/$GITHUB_REPOSITORY/actions/runs/$SANITIZED_AUDIT_RUN_ID" \
            > "$RUNNER_TEMP/evidenceops-audit-run.json"
          jq -e '
            .name == "Read-only Intune audit" and
            .path == ".github/workflows/intune-audit.yml" and
            .event == "workflow_dispatch" and
            .head_branch == "main" and
            .status == "completed" and
            .conclusion == "success"
          ' "$RUNNER_TEMP/evidenceops-audit-run.json" > /dev/null || {
            echo "selected artifact is not from a successful trusted-main Intune audit" >&2
            exit 2
          }

      - name: Download reviewed sanitized Mission package
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: evidenceops-sanitized-mission-${{ inputs.sanitized_audit_run_id }}
          path: build/publication-handoff
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.sanitized_audit_run_id }}

      - name: Revalidate and stage live sanitized dashboard
        run: |
          test "$(find build/publication-handoff -mindepth 1 -print | wc -l | tr -d ' ')" = "1"
          python scripts/promote_live_mission.py build/publication-handoff/mission-control.json
          python scripts/check_public_artifacts.py build/publication-handoff
          python scripts/check_secrets.py
          actual_snapshot_id="$(jq -r '.snapshot_id' docs/assets/data/mission-control.json)"
          if [ "$actual_snapshot_id" != "$EXPECTED_SOURCE_SNAPSHOT_ID" ]; then
            echo "reviewed artifact does not match the expected Mission snapshot ID" >&2
            exit 2
          fi
          mkdocs build --strict
          python scripts/check_public_artifacts.py site
          npm run validate:worker

      - name: Recheck exact snapshot immediately before deployment
        run: |
          snapshot_id="$(jq -r '.snapshot_id' docs/assets/data/mission-control.json)"
          if [ "$snapshot_id" != "$EXPECTED_SOURCE_SNAPSHOT_ID" ]; then
            echo "staged Mission snapshot changed after validation" >&2
            exit 2
          fi

      - name: Deploy production Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          deployment_message="evidenceops-snapshot:$EXPECTED_SOURCE_SNAPSHOT_ID"
          npm run deploy:production -- --message "$deployment_message"
          npx wrangler versions list --env production --json \
            > "$RUNNER_TEMP/evidenceops-versions.json"
          npx wrangler deployments list --env production --json \
            > "$RUNNER_TEMP/evidenceops-deployments.json"
          python scripts/verify_cloudflare_deployment.py \
            "$RUNNER_TEMP/evidenceops-versions.json" \
            "$RUNNER_TEMP/evidenceops-deployments.json" \
            --expected-message "$deployment_message"
